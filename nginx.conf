server {
    listen 80;
    
    # Usamos el DNS interno de Docker para resolver el host dinámicamente.
    # Esto evita que Nginx haga crash si el 'backend' tarda unos segundos más en iniciar.
    resolver 127.0.0.11 valid=30s;

    # Serve static assets
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Al usar una variable, forzamos la resolución dinámica de DNS
        set $upstream http://backend:5001;
        proxy_pass $upstream/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
